name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platforms/desktop_windows/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: platforms/desktop_windows

      - name: Create backend stub for CI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "backend/dist/backend"
          New-Item -ItemType File -Force -Path "backend/.env"

      - name: Build Windows installer
        run: npm run build:windows
        working-directory: platforms/desktop_windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: platforms/desktop_windows/release/*.exe
          retention-days: 5

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platforms/desktop_mac/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: platforms/desktop_mac

      - name: Build macOS installer
        run: npm run build:mac
        working-directory: platforms/desktop_mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: platforms/desktop_mac/release/*.dmg
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platforms/desktop_windows/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: platforms/desktop_windows

      - name: Install Linux build deps
        run: sudo apt-get install -y rpm

      - name: Build Linux installer
        run: npm run build && electron-builder --linux AppImage
        working-directory: platforms/desktop_windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: platforms/desktop_windows/release/*.AppImage
          retention-days: 5

  publish-release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./release

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: ./release

      - name: Download Linux installer
        uses: actions/download-artifact@v4
        with:
          name: linux-installer
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/*.exe
            ./release/*.dmg
            ./release/*.AppImage
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
