version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - APP_CELERY_BROKER_URL=redis://redis:6379/0
      - APP_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - APP_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - APP_STORAGE_DIR=/app/storage
      - APP_WHISPER_MODEL=${WHISPER_MODEL:-small}
    volumes:
      - backend_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy

  celery_worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1
    environment:
      - APP_CELERY_BROKER_URL=redis://redis:6379/0
      - APP_CELERY_RESULT_BACKEND=redis://redis:6379/1
      - APP_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - APP_STORAGE_DIR=/app/storage
      - APP_WHISPER_MODEL=${WHISPER_MODEL:-small}
    volumes:
      - backend_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy

  browser:
    build: ./platforms/browser
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  redis_data:
  backend_storage:
