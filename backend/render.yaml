services:
  - type: web
    name: transkrib-api
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: python3 standalone_server.py
    healthCheckPath: /api/system/license
    envVars:
      - key: HOST
        value: '0.0.0.0'
      - key: APP_WHISPER_MODEL
        value: tiny
      - key: APP_ANTHROPIC_API_KEY
        sync: false
